name: Bolt CI

on:
  push:
  pull_request:
  workflow_dispatch: # This let's us trigger the workflow manually from GitHub.

jobs:
  annotation-processor:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 8
      - uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.3
          build-root-directory: processor
      - name: Execute build
        working-directory: processor
        run: |
          chmod +x ./gradlew
          ./gradlew build

  cli:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-linux
          - os: macos-12
            target: x86_64-apple-darwin
          - os: windows-2022
            target: x86_64-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1.5.1
      - name: Install dependencies
        run: dart pub get
      - name: Verify formatting
        if: ${{ github.event_name == 'pull_request' }}
        run: dart format -o none --set-exit-if-changed .
      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Analyze source
        if: ${{ github.event_name == 'pull_request' }}
        run: dart analyze
      - name: Build executable
        shell: bash
        run: |
          mkdir build
          if [ "$OS" = "Windows_NT" ]; then
            dart compile exe -o build/bolt.exe bin/bolt.dart
          else
            dart compile exe -o build/bolt bin/bolt.dart
          fi
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: bolt-${{ matrix.target }}
          path: build/*

  termux-cli:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Build executable inside Termux container
        run: |
          docker run --rm --platform linux/arm64 -v ${{ github.workspace }}:/workspace termux/termux-docker:aarch64 /entrypoint_root.sh /bin/bash -c "
            set -e
            pkg update -y
            pkg install -y dart git
            cd /workspace
            rm -rf build/
            dart pub get
            dart run build_runner build --delete-conflicting-outputs
            mkdir -p build
            dart compile exe -o build/bolt bin/bolt.dart
          "
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: bolt-aarch64-termux
          path: build/*

  create-release:
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    needs: [cli, termux-cli, annotation-processor]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Download JAR dependencies
        run: |
          mkdir libs && cd libs
          wget https://github.com/mit-cml/appinventor-sources/raw/master/appinventor/lib/kawa/kawa-1.11-modified.jar
          wget https://github.com/mit-cml/appinventor-sources/raw/master/appinventor/lib/physicaloid/physicaloid-library.jar
          wget https://dl.google.com/android/repository/platform-33_r02.zip && unzip platform-33_r02.zip 
          cp android-13/android.jar android-33.jar
          rm -r android-13 platform-33_r02.zip
      - name: Create platform archives
        run: |
          mkdir archives
          
          package_zip() {
            local src_dir=$1
            local dest_dir=$2
            local zip_name=$3
            
            mkdir -p $dest_dir/bin
            mv $src_dir/bolt* $dest_dir/bin/
            cp libs/ $dest_dir -r
            cd $dest_dir && zip ../archives/$zip_name.zip . -r9 && cd ..
          }

          package_zip bolt-x86_64-linux bolt-linux bolt-linux
          package_zip bolt-x86_64-windows bolt-win bolt-win
          package_zip bolt-x86_64-apple-darwin bolt-mac bolt-mac
          package_zip bolt-aarch64-termux bolt-termux bolt-termux
      - name: Create a new draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: archives/*.zip
